<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vantage Voices Group Ltd logo</title>
  <desc>SVG logo showing VaVo with a magnifying glass and bar/line chart, plus the tagline Tracking Voices. Delivering Insights.</desc>

  <defs>
    <clipPath id="cardClip">
      <rect x="20" y="10" width="640" height="460" rx="18"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect x="20" y="10" width="640" height="460" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Corner accent – dark navy top-left arc -->
  <path d="M20 10 L160 10 Q20 10 20 150 Z" fill="#0A2540" clip-path="url(#cardClip)"/>
  <!-- Gold arc -->
  <path d="M20 10 Q20 200 130 320" fill="none" stroke="#C9A84C" stroke-width="10" stroke-linecap="round" clip-path="url(#cardClip)"/>
  <!-- Teal arc -->
  <path d="M20 10 Q20 220 155 355" fill="none" stroke="#2A7F6F" stroke-width="6" stroke-linecap="round" clip-path="url(#cardClip)"/>

  <!-- Magnifying glass circle -->
  <circle cx="340" cy="165" r="88" fill="none" stroke="#0A2540" stroke-width="8"/>
  <!-- Handle -->
  <line x1="403" y1="228" x2="438" y2="263" stroke="#0A2540" stroke-width="14" stroke-linecap="round"/>
  <!-- Handle grip cap -->
  <circle cx="440" cy="265" r="7" fill="#0A2540"/>

  <!-- Bar chart inside lens -->
  <rect x="276" y="205" width="22" height="38" rx="3" fill="#0A2540"/>
  <rect x="305" y="185" width="22" height="58" rx="3" fill="#2A7F6F"/>
  <rect x="334" y="165" width="22" height="78" rx="3" fill="#2A7F6F"/>
  <rect x="363" y="148" width="22" height="95" rx="3" fill="#2A7F6F"/>

  <!-- Trend line over bars -->
  <polyline points="265,215 290,200 318,185 348,165 378,140 408,115" fill="none" stroke="#0A2540" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="265" cy="215" r="5" fill="#0A2540"/>
  <circle cx="290" cy="200" r="5" fill="#0A2540"/>
  <circle cx="318" cy="185" r="5" fill="#0A2540"/>
  <circle cx="348" cy="165" r="5" fill="#0A2540"/>
  <circle cx="378" cy="140" r="5" fill="#0A2540"/>
  <!-- Arrow tip -->
  <polyline points="400,112 410,114 408,124" fill="none" stroke="#2A7F6F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="409" cy="114" r="4" fill="#2A7F6F"/>

  <!-- VaVo wordmark -->
  <text x="225" y="336" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="#0A2540" letter-spacing="-2">Va</text>
  <text x="385" y="336" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="700" fill="#2A7F6F" letter-spacing="-2">Vo</text>

  <!-- Divider lines + company name -->
  <line x1="80" y1="356" x2="215" y2="356" stroke="#0A2540" stroke-width="1.5"/>
  <line x1="465" y1="356" x2="600" y2="356" stroke="#0A2540" stroke-width="1.5"/>
  <text x="340" y="361" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="13" font-weight="600" fill="#0A2540" letter-spacing="3">VANTAGE VOICES GROUP LTD</text>

  <!-- Tagline -->
  <text x="340" y="395" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-style="italic" fill="#0A2540">Tracking Voices. Delivering Insights</text>

  <!-- Bottom teal rule -->
  <line x1="270" y1="415" x2="410" y2="415" stroke="#2A7F6F" stroke-width="2"/>
</svg>
